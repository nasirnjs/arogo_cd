apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: manual-sync
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nasirnjs/kinder-ci-k8s.git
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy: {}   # No automation (manual sync only)