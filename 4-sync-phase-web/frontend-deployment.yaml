# frontend-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  annotations:
    argocd.argoproj.io/sync-wave: "15"         # Higher wave → after backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: web
        image: yourcompany/frontend:v3.1
        ports:
        - containerPort: 80
        env:
        - name: REACT_APP_API_URL           # Frontend knows backend exists
          value: "http://backend:8080"
        readinessProbe:
          httpGet:
            path: /
            port: 80