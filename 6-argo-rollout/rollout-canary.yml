# -------------------------------
# Stable & Canary Services
# -------------------------------
apiVersion: v1
kind: Service
metadata:
  name: demo-app-stable
  namespace: istio-system
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 80
      name: http

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-canary
  namespace: istio-system
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 80
      name: http

---
# -------------------------------
# Rollout (FIXED)
# -------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
  namespace: istio-system
spec:
  replicas: 5
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        version: stable
    spec:
      containers:
        - name: demo-app
          image: nasirnjs/kinder-frontend:18
          ports:
            - containerPort: 80
  strategy:
    canary:
      stableService: demo-app-stable
      canaryService: demo-app-canary
      maxSurge: 1
      maxUnavailable: 0
      trafficRouting:
        istio:
          virtualService:
            name: demo-app-vs
          destinationRule:
            name: demo-app-dr
            stableSubsetName: stable
            canarySubsetName: canary
      steps:
        - setWeight: 20
        - pause: { duration: 1m }
        - setWeight: 50
        - pause: { duration: 2m }
        - setWeight: 100
      scaleDownDelaySeconds: 30
---
# -------------------------------
# Horizontal Pod Autoscaler
# -------------------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app-hpa
  namespace: istio-system
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: demo-app
  minReplicas: 5
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

---
# -------------------------------
# Istio Gateway
# -------------------------------
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: demo-app-gateway
  namespace: istio-system
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "nasirtechtalks.com"

---
# -------------------------------
# Istio DestinationRule
# -------------------------------
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: demo-app-dr
  namespace: istio-system
spec:
  host: demo-app
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary

---
# -------------------------------
# Istio VirtualService
# -------------------------------
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: demo-app-vs
  namespace: istio-system
spec:
  hosts:
    - "nasirtechtalks.com"
  gateways:
    - demo-app-gateway
  http:
    - route:
        - destination:
            host: demo-app
            subset: stable
          weight: 80
        - destination:
            host: demo-app
            subset: canary
          weight: 20