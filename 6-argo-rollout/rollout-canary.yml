apiVersion: v1
kind: Service
metadata:
  name: demo-app-stable
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: demo-app

---
apiVersion: v1
kind: Service
metadata:
  name: demo-app-canary
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: http
  selector:
    app: demo-app
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: demo-app
spec:
  replicas: 10
  revisionHistoryLimit: 5
  minReadySeconds: 30

  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: demo-app
          image: nginx:1.27          # Change image tag/env to trigger new rollout
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15

  strategy:
    canary:
      # Required for NGINX traffic routing
      canaryService: demo-app-canary
      stableService: demo-app-stable

      trafficRouting:
        nginx:
          stableIngress: demo-app-ingress

      # Recommended settings
      maxSurge: 25%
      maxUnavailable: 0
      dynamicStableScale: true        # Works well with HPA

      # Background analysis (runs during the whole rollout)
      analysis:
        templates:
          - templateName: success-rate

      # Your requested gradual traffic shift
      steps:
        - setWeight: 20               # Start with 20% traffic to canary
        - pause:
            duration: 5m              # Observe for 5 minutes (adjust as needed)

        - setWeight: 50               # Increase to 50% traffic to canary
        - pause:
            duration: 10m             # Longer observation window at 50%

        - setWeight: 100              # Full promotion (100% to new version)
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-app-hpa
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: demo-app
  minReplicas: 5
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
spec:
  metrics:
    - name: success-rate
      interval: 30s
      successCondition: result[0] >= 95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-operated.prometheus.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{status!~"5..",app="demo-app"}[5m])) 
            / 
            sum(rate(http_requests_total{app="demo-app"}[5m])) * 100
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-app-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: demo-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-app-stable
                port:
                  number: 80