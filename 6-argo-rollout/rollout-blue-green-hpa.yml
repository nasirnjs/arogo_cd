apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: blue-green-app
  namespace: default
  annotations:
    # Helpful for GitOps tools to ignore replica count changes
    argocd.argoproj.io/sync-options: "IgnoreExtraneous"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: blue-green-app
  template:
    metadata:
      labels:
        app: blue-green-app
    spec:
      containers:
      - name: blue-green-container
        image: nginx:1.23
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
  strategy:
    blueGreen:
      # IMPORTANT: Use previewReplicaCount to control scaling costs
      previewReplicaCount: 1  # Keeps preview environment small
      activeService: blue-green-app-active
      previewService: blue-green-app-preview
      autoPromotionEnabled: false
      # Optional: Add a delay before auto-promotion
      autoPromotionSeconds: 30
      # Optional: Scale down old ReplicaSet after promotion
      scaleDownDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blue-green-app-active
  namespace: default
spec:
  selector:
    app: blue-green-app
    # IMPORTANT: Add a version label selector for clarity
    # Note: Argo Rollouts automatically adds a rollout-pod-template-hash label
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: blue-green-app-preview
  namespace: default
spec:
  selector:
    app: blue-green-app
    # This service will route to the preview version during deployment
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: blue-green-app-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: blue-green-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 20
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 40
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max